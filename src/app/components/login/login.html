<div class="parent">
  <div class="div1">
    <div class>
      <div class="brand">
        <div class="brand__icon" aria-hidden="true">💪</div>
        <h1 class="brand__title">LagunaFitnes</h1>
        <p class="brand__subtitle">Progreso, constancia y administración inteligente</p>
      </div>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="login-form">

  <mat-form-field appearance="outline" class="full">
    <mat-label>Usuario</mat-label>

   

    <input 
      matInput 
      formControlName="email" 
      placeholder="Ingrese su usuario">

  </mat-form-field>


  <mat-form-field appearance="outline" class="full">

    <mat-label>Contraseña</mat-label>

    <input
      matInput
      [type]="hidePassword ? 'password' : 'text'"
      formControlName="password"
      placeholder="Ingrese su contraseña"
    >

  </mat-form-field>


  <button
    mat-raised-button
    color="primary"
    class="btn"
    type="submit"
    [disabled]="loginForm.invalid || loading"
  >

    <mat-spinner
      *ngIf="loading"
      diameter="22"
    ></mat-spinner>

    <span *ngIf="!loading">
      Ingresar
    </span>

  </button>

</form>
     
    </div>
  </div>
  <div class="div2">
    <img src="/gimnasio_fondo.png" alt="Gimnasio foto" />
  </div>
</div>
