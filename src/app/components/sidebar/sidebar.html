<div class="dashboard-layout" [class.collapsed]="isCollapsed">
  
  <aside class="sidebar">
    <div class="sidebar__brand">
      <mat-icon color="primary" class="brand-icon material-icons-outlined">fitness_center</mat-icon>
      <h2 *ngIf="!isCollapsed">LagunaFitnes</h2>
      <button mat-icon-button class="toggle-btn" (click)="toggleSidebar()">
        <mat-icon>{{ isCollapsed ? 'menu' : 'menu_open' }}</mat-icon>
      </button>
    </div>

    <nav class="sidebar__nav">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item" title="Dashboard">
        <mat-icon>dashboard</mat-icon>
        <span class="nav-label">Dashboard</span>
      </a>
      <a routerLink="/members" routerLinkActive="active" class="nav-item" title="Miembros">
        <mat-icon>group</mat-icon>
        <span class="nav-label">Miembros</span>
      </a>
      <a routerLink="/visits" routerLinkActive="active" class="nav-item" title="Visitas">
        <mat-icon>event_available</mat-icon>
        <span class="nav-label">Visitas</span>
      </a>
      <a routerLink="/analytics" routerLinkActive="active" class="nav-item" title="Analíticas">
        <mat-icon>analytics</mat-icon>
        <span class="nav-label">Analíticas</span>
      </a>
      <a routerLink="/settings" routerLinkActive="active" class="nav-item" title="Configuración">
        <mat-icon>settings</mat-icon>
        <span class="nav-label">Configuración</span>
      </a>
    </nav>

    <div class="sidebar__footer">
      <button (click)="authService.logout()" class="nav-item btn-logout" title="Cerrar Sesión">
        <mat-icon>logout</mat-icon>
        <span class="nav-label">Cerrar Sesión</span>
      </button>
    </div>
  </aside>

  <div class="main-wrapper">
    
    <header class="topbar">
      <div class="search-bar">
        <mat-icon class="search-icon">search</mat-icon>
        <input type="text" placeholder="Buscar miembro o documento...">
      </div>
      <div class="topbar__actions">
        <button mat-icon-button><mat-icon>notifications</mat-icon></button>
        <div class="user-profile" *ngIf="authService.currentUser$ | async as user">
          <img [src]="'https://ui-avatars.com/api/?name=' + user.nombre + '&background=random'" [alt]="user.nombre" class="avatar">
          <span>{{ user.nombre }}</span>
        </div>
      </div>
    </header>

    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
