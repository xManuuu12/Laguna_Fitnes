<h2 mat-dialog-title>{{ isEditMode ? 'Editar Miembro' : 'Agregar Miembro' }}</h2>
<mat-dialog-content>
  <form [formGroup]="memberForm" class="member-form">
    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>Nombre</mat-label>
        <input matInput formControlName="nombre" placeholder="Nombre">
        <mat-error *ngIf="memberForm.get('nombre')?.hasError('required')">El nombre es requerido</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Apellido</mat-label>
        <input matInput formControlName="apellido" placeholder="Apellido">
        <mat-error *ngIf="memberForm.get('apellido')?.hasError('required')">El apellido es requerido</mat-error>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline">
      <mat-label>Teléfono</mat-label>
      <input matInput formControlName="telefono" placeholder="Ej. 8712345678">
      <mat-error *ngIf="memberForm.get('telefono')?.hasError('required')">El teléfono es requerido</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Estado</mat-label>
      <mat-select formControlName="estado">
        <mat-option value="activo">Activo</mat-option>
        <mat-option value="vencido">Vencido</mat-option>
      </mat-select>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancelar</button>
  <button mat-flat-button color="primary" [disabled]="memberForm.invalid" (click)="onSubmit()">
    {{ isEditMode ? 'Actualizar' : 'Guardar' }}
  </button>
</mat-dialog-actions>
