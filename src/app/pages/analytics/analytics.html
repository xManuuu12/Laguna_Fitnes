<app-status-template [status]="status">
  <div class="content__header">
    <div>
      <h1>Analíticas y Reportes</h1>
      <p class="subtitle">Visualiza el rendimiento y crecimiento de tu gimnasio</p>
    </div>
    <div class="header-actions">
      <button mat-flat-button class="btn-primary" (click)="exportData()">
        <mat-icon>download</mat-icon> Exportar Excel
      </button>
    </div>
  </div>

  <div class="analytics-grid">
    <!-- Tarjeta de Estado de Miembros (Pie) -->
    <mat-card class="chart-card">
      <mat-card-header>
        <mat-card-title>Estado de Miembros</mat-card-title>
        <mat-card-subtitle>Activos vs Inactivos</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <div class="chart-container">
          <canvas baseChart
            [data]="pieChartData"
            [options]="pieChartOptions"
            [type]="pieChartType">
          </canvas>
        </div>
      </mat-card-content>
    </mat-card>

    <!-- Tarjeta de Distribución de Membresías (Bar) -->
    <mat-card class="chart-card">
      <mat-card-header>
        <mat-card-title>Distribución por Plan</mat-card-title>
        <mat-card-subtitle>Popularidad de membresías</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <div class="chart-container">
          <canvas baseChart
            [data]="barChartData"
            [options]="barChartOptions"
            [type]="barChartType">
          </canvas>
        </div>
      </mat-card-content>
    </mat-card>

    <!-- Tarjeta de Tendencia de Visitas (Line) - Full Width -->
    <mat-card class="chart-card full-width">
      <mat-card-header class="header-with-filter">
        <div>
          <mat-card-title>Tendencia de Visitas</mat-card-title>
          <mat-card-subtitle>Análisis de asistencia temporal</mat-card-subtitle>
        </div>
        <div class="filter-container">
          <mat-form-field appearance="outline" subscriptSizing="dynamic">
            <mat-label>Ver visitas por</mat-label>
            <mat-select [value]="selectedVisitFilter" (selectionChange)="onMatFilterChange($event)">
              <mat-option value="ultimos7Dias">Últimos 7 días</mat-option>
              <mat-option value="porDiaSemana">Días de la semana (Promedio)</mat-option>
              <mat-option value="porSemana">Por Semana</mat-option>
              <mat-option value="porMes">Por Mes</mat-option>
            </mat-select>
          </mat-form-field>
        </div>
      </mat-card-header>
      <mat-card-content>
        <div class="chart-container-large">
          <canvas baseChart
            [data]="lineChartData"
            [options]="lineChartOptions"
            [type]="'line'">
          </canvas>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</app-status-template>
